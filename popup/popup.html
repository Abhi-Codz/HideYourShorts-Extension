<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HideYourShorts</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div class="container">

        <div class="title">
            HideYourShorts
        </div>

        <div class="setting-row">
            <div class="label-box">
                Extension
            </div>

            <div class="toggle-box" data-setting="enabled">
                <button class="toggle-option on active">ON</button>
                <button class="toggle-option off">OFF</button>
            </div>
        </div>

        <div class="setting-row">
            <div class="label-box">
                Home Page
            </div>

            <div class="toggle-box" data-setting="hideHomeShorts">
                <button class="toggle-option on active">ON</button>
                <button class="toggle-option off">OFF</button>
            </div>
        </div>

        <div class="setting-row">
            <div class="label-box">
                Search Results
            </div>

            <div class="toggle-box" data-setting="hideSearchShorts">
                <button class="toggle-option on active">ON</button>
                <button class="toggle-option off">OFF</button>
            </div>
        </div>

        <div class="setting-row">
            <div class="label-box">
                Sidebar Navigation
            </div>

            <div class="toggle-box" data-setting="hideSidebarShorts">
                <button class="toggle-option on active">ON</button>
                <button class="toggle-option off">OFF</button>
            </div>
        </div>

        <div class="status-box">
            <span id="statusText">
                Status: Positive
            </span>

            <span id="statusDot" class="status-dot positive"></span>
        </div>

        <div class="version-box">
            Version 1.1.0
        </div>

        <div class="footer">
            © 2026 Abhinav Mishra
        </div>

    </div>

    <script src="../content/api.js"></script>
    <script src="popup.js"></script>

</body>
</html>
