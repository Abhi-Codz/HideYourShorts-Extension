<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HideYourShorts</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div class="container">

        <h2>HideYourShorts</h2>

        <label class="setting">
            <input type="checkbox" id="enabled">
            <span>Enable Extension</span>
        </label>

        <hr>

        <label class="setting">
            <input type="checkbox" id="home">
            <span>Hide Shorts on Home Page</span>
        </label>

        <label class="setting">
            <input type="checkbox" id="search">
            <span>Hide Shorts on Search Panel</span>
        </label>

        <label class="setting">
            <input type="checkbox" id="sidebar">
            <span>Hide Shorts on Sidebar Container</span>
        </label>

    </div>

    <script src="popup.js"></script>

</body>
</html>
